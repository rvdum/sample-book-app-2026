services:
  sample-book-app-dev:
    build: .
    image: mtararujs/sample-book-app
    container_name: sample-book-app-dev
    ports:
      - 1010:1050
    networks:
      - sample-book-app-compose-network
  sample-book-app-stg:
    build: .
    image: mtararujs/sample-book-app
    container_name: sample-book-app-stg
    ports:
      - 2020:1050
    networks:
      - sample-book-app-compose-network
  sample-book-app-prd:
    build: .
    image: mtararujs/sample-book-app
    container_name: sample-book-app-prd
    ports:
      - 3030:1050
    networks:
      - sample-book-app-compose-network

networks:
  sample-book-app-compose-network:
    name: sample-book-app-compose-network
    



# docker build - t mtararujs/sample-book-app . 
# docker run --rm --network sample-book-app-network -p 1050:1050 --name sample-book-app-local sample-book-app
